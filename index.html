<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide</title>
    <link rel="icon" href="photo_5460840021544867925_w.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <!-- Лево -->
            <div class="logo">
                <img src="photo_5460840021544867927_w.jpg" alt="Logo">
            </div>

            <!-- Центр -->
            <div class="search-box">
                <input type="text" placeholder="Поиск видео...">
                <button>Найти</button>
            </div>

            <!-- Право -->
            <div class="user-actions">
                <button class="btn-upload"><span>+</span> Загрузить</button>
                <button class="btn-login">Войти</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="video-grid" id="video-grid">
            <!-- Карточки -->
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ForVide. Все права защищены.</p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
