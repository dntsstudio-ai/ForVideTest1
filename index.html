<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide - Web 3.0</title>
    <!-- Геометрический рубленый шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Угловой поиск и Логотип -->
    <header class="top-layer">
        <div class="logo">FOR<span class="accent">VIDE</span></div>
        <div class="search-corner">
            <input type="text" placeholder="SEARCH...">
        </div>
    </header>

    <!-- Главный экран (без скролла) -->
    <main class="bento-grid" id="bento-container">
        <!-- JS сгенерирует здесь асимметричные плитки -->
    </main>

    <!-- Плавающая навигация в стиле приложения -->
    <nav class="floating-nav">
        <button class="nav-btn active">PLAY</button>
        <button class="nav-btn">TRENDING</button>
        <button class="nav-btn">LIBRARY</button>
        <button class="nav-btn">STUDIO</button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
