<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide</title>
    <link rel="icon" href="photo_5460840021544867925_w.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Верхний бар -->
    <header class="top-bar">
        <!-- Левая часть: Логотип -->
        <div class="logo-area">
            <a href="index.html">
                <img src="photo_5460840021544867927_w.jpg" alt="ForVide Logo" class="logo-img">
            </a>
        </div>

        <!-- Центральная часть: Поиск -->
        <div class="search-area">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Поиск видео...">
                <button class="search-btn">Найти</button>
            </div>
        </div>

        <!-- Правая часть: Кнопки -->
        <div class="buttons-area">
            <button class="action-btn">Загрузить</button>
            <button class="auth-btn">Войти</button>
        </div>
    </header>

    <!-- Сетка видеороликов -->
    <main class="main-content">
        <div class="video-grid" id="video-grid">
            <!-- Карточки генерируются через JS -->
        </div>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
