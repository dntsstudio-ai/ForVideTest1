<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ForVide — Видео без границ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #F5F5FA;
            --bg-white: #FFFFFF;
            --text-main: #1A1B41;
            --text-soft: #5A5B6E;
            --text-muted: #8E8EA0;
            --accent: #FF6B55;
            --accent-hover: #FF4F3A;
            --border-light: #E8E8F0;
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.08);
            --radius-card: 16px;
            --radius-btn: 24px;
            --transition: 0.25s cubic-bezier(0.2, 0.0, 0, 1.0);
        }

        body {
            background: var(--bg-page);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        /* ===== Шапка ===== */
        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-light);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            user-select: none;
        }
        .logo span {
            color: var(--accent);
            font-weight: 800;
        }

        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 550;
            color: var(--text-soft);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .nav-tab.active {
            background: var(--text-main);
            color: white;
            font-weight: 600;
        }
        .nav-tab:hover:not(.active) {
            background: var(--bg-page);
            color: var(--text-main);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 10px 16px 10px 40px;
            font-size: 0.9rem;
            width: 240px;
            outline: none;
            transition: all var(--transition);
            color: var(--text-main);
        }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 85, 0.1);
            width: 280px;
        }
        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 1rem;
        }
        .clear-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
            padding: 2px;
            border-radius: 50%;
        }
        .clear-search.visible {
            display: block;
        }
        .clear-search:hover {
            color: var(--text-main);
            background: var(--border-light);
        }

        .btn-upload {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-upload:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn-upload:active {
            transform: scale(0.98);
        }

        /* Гамбургер */
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-main);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background var(--transition);
        }
        .menu-btn:hover {
            background: var(--bg-page);
        }

        /* ===== Боковое меню ===== */
        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-white);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.08);
            z-index: 200;
            transition: right var(--transition);
            padding: 80px 28px 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .side-menu.open {
            right: 0;
        }
        .side-menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 1.05rem;
            padding: 12px 16px;
            border-radius: 12px;
            transition: background var(--transition);
        }
        .side-menu a:hover {
            background: var(--bg-page);
        }
        .side-menu .menu-divider {
            border-top: 1px solid var(--border-light);
            margin: 8px 0;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== Контент ===== */
        .hero {
            padding: 48px 0 24px;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-main);
            margin-bottom: 12px;
        }
        .hero h1 span {
            color: var(--accent);
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-soft);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .main-content {
            padding-bottom: 60px;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .results-count {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--bg-white);
            border-radius: var(--radius-card);
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: box-shadow var(--transition), transform var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .video-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }
        .video-card:active {
            transform: scale(0.99);
        }

        .thumb {
            aspect-ratio: 16 / 9;
            background: #E1E1ED;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--text-muted);
            position: relative;
        }
        .thumb .duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(6px);
        }
        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-title {
            font-weight: 650;
            font-size: 1rem;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .channel-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: auto;
        }
        .channel-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--text-soft);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .channel-name {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-soft);
        }

        .empty-message {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        /* ===== Футер ===== */
        .footer {
            border-top: 1px solid var(--border-light);
            padding: 24px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: var(--bg-white);
        }
        .footer-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .footer-links a {
            color: var(--text-soft);
            text-decoration: none;
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* ===== Адаптив ===== */
        @media (max-width: 768px) {
            .header-inner {
                flex-wrap: wrap;
            }
            .search-box input {
                width: 180px;
            }
            .search-box input:focus {
                width: 200px;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }
        @media (max-width: 480px) {
            .nav-tab {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
            .search-box input {
                width: 140px;
            }
            .search-box input:focus {
                width: 160px;
            }
            .btn-upload {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <aside class="side-menu" id="sideMenu">
        <a href="#">📺 Подписки</a>
        <a href="#">📚 Библиотека</a>
        <a href="#">🕐 История</a>
        <div class="menu-divider"></div>
        <a href="#">ℹ️ О платформе</a>
        <a href="#">⚙️ Настройки</a>
    </aside>

    <header class="header">
        <div class="container header-inner">
            <a href="#" class="logo">For<span>Vide</span></a>
            <div class="nav-tabs" id="navTabs">
                <button class="nav-tab active" data-tab="home">Главная</button>
                <button class="nav-tab" data-tab="trends">Тренды</button>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Поиск видео..." autocomplete="off">
                    <button class="clear-search" id="clearSearch" title="Очистить">✕</button>
                </div>
                <button class="btn-upload" id="uploadBtn">+ Загрузить</button>
                <button class="menu-btn" id="menuBtn" aria-label="Меню">☰</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero container">
            <h1>Видео без границ — <span>шире взгляд</span></h1>
            <p>Смотрите, загружайте, открывайте новое. Легко и свободно.</p>
        </section>

        <section class="main-content container">
            <div class="section-header">
                <h2 id="sectionTitle">🎬 Рекомендации</h2>
                <span class="results-count" id="resultsCount"></span>
            </div>
            <div class="video-grid" id="videoGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="#">Правила</a>
                <a href="#">Конфиденциальность</a>
                <a href="#">Помощь</a>
            </div>
            <p>© 2026 ForVide. Видео без границ.</p>
        </div>
    </footer>

    <script>
        (function() {
            // Данные видео
            const allVideos = [
                { id: 1, title: "Как я снял фильм на смартфон за 24 часа", channel: "КиноLab", avatar: "К", views: "1.2M", time: "3 дня назад", duration: "18:42", trending: true },
                { id: 2, title: "Исландия: ледяные пещеры и северное сияние", channel: "WideWorld", avatar: "W", views: "890K", time: "1 нед. назад", duration: "24:15", trending: true },
                { id: 3, title: "Новый движок ForVide: взгляд изнутри", channel: "ForVide Tech", avatar: "F", views: "456K", time: "2 дня назад", duration: "12:08", trending: true },
                { id: 4, title: "Геймплей: открытый космос без границ", channel: "DeepSpace", avatar: "D", views: "2.1M", time: "5 часов назад", duration: "32:50", trending: true },
                { id: 5, title: "Дизайн без компромиссов: интервью с арт-директором", channel: "ДизайнПоток", avatar: "Д", views: "320K", time: "4 дня назад", duration: "15:30", trending: false },
                { id: 6, title: "Прямой эфир: RPG-стрим с разработчиками", channel: "GameOn", avatar: "G", views: "678K", time: "Сейчас", duration: "LIVE", trending: true },
                { id: 7, title: "Секреты монтажа: переходы которые удивляют", channel: "PostPro", avatar: "P", views: "203K", time: "6 дней назад", duration: "9:22", trending: false },
                { id: 8, title: "Обзор нового MacBook Pro 2026", channel: "TechHub", avatar: "T", views: "1.5M", time: "1 день назад", duration: "21:10", trending: true },
                { id: 9, title: "Утренняя йога на берегу океана", channel: "Wellness", avatar: "W", views: "98K", time: "2 недели назад", duration: "28:00", trending: false }
            ];

            // Состояние
            let currentTab = 'home'; // home или trends
            let searchQuery = '';

            // DOM элементы
            const videoGrid = document.getElementById('videoGrid');
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearch');
            const sectionTitle = document.getElementById('sectionTitle');
            const resultsCount = document.getElementById('resultsCount');
            const navTabs = document.getElementById('navTabs');
            const menuBtn = document.getElementById('menuBtn');
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');

            // Рендер карточек
            function renderCards() {
                let filtered = [];

                if (currentTab === 'trends') {
                    filtered = allVideos.filter(v => v.trending);
                } else {
                    filtered = [...allVideos];
                }

                if (searchQuery.trim() !== '') {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(v => 
                        v.title.toLowerCase().includes(q) || 
                        v.channel.toLowerCase().includes(q)
                    );
                }

                // Обновление заголовка и счётчика
                if (currentTab === 'trends') {
                    sectionTitle.textContent = '🔥 Тренды';
                } else {
                    sectionTitle.textContent = '🎬 Рекомендации';
                }
                resultsCount.textContent = filtered.length > 0 ? `Показано ${filtered.length} видео` : '';

                // Отрисовка
                videoGrid.innerHTML = '';
                if (filtered.length === 0) {
                    videoGrid.innerHTML = '<div class="empty-message">😕 Ничего не найдено<br>Попробуйте изменить запрос</div>';
                    return;
                }

                filtered.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="thumb">
                            🎬
                            <span class="duration">${v.duration}</span>
                        </div>
                        <div class="card-body">
                            <div class="card-title">${v.title}</div>
                            <div class="card-meta">
                                <span>${v.views} просмотров</span>
                                <span>·</span>
                                <span>${v.time}</span>
                            </div>
                            <div class="channel-row">
                                <div class="channel-avatar">${v.avatar}</div>
                                <span class="channel-name">${v.channel}</span>
                            </div>
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        alert(`▶️ Воспроизведение: "${v.title}"\n(демонстрация функционала)`);
                    });
                    videoGrid.appendChild(card);
                });
            }

            // Обработчики вкладок
            navTabs.addEventListener('click', (e) => {
                if (e.target.classList.contains('nav-tab')) {
                    document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentTab = e.target.dataset.tab;
                    renderCards();
                }
            });

            // Поиск с мгновенной фильтрацией
            function applySearch() {
                searchQuery = searchInput.value;
                if (searchQuery.trim() !== '') {
                    clearSearchBtn.classList.add('visible');
                } else {
                    clearSearchBtn.classList.remove('visible');
                }
                renderCards();
            }

            searchInput.addEventListener('input', applySearch);
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                applySearch();
                searchInput.focus();
            });

            // Меню
            function openMenu() {
                sideMenu.classList.add('open');
                overlay.classList.add('visible');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                sideMenu.classList.remove('open');
                overlay.classList.remove('visible');
                document.body.style.overflow = '';
            }

            menuBtn.addEventListener('click', openMenu);
            overlay.addEventListener('click', closeMenu);
            // Закрытие по Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sideMenu.classList.contains('open')) {
                    closeMenu();
                }
            });

            // Кнопка загрузки (заглушка)
            document.getElementById('uploadBtn').addEventListener('click', () => {
                alert('🚀 Загрузка видео (демо)');
            });

            // Инициализация
            renderCards();

            // Отслеживание изменения размера для адаптива (не требуется)
            console.log('🎥 ForVide – лёгкий видеоплеер готов. Используйте поиск и вкладки.');
        })();
    </script>
</body>
</html>
