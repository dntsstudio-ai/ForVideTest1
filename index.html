<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide — Твой видеохостинг</title>
    <link rel="icon" href="photo_5460840021544867925_w.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
    <!-- Подключаем иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <a href="index.html" class="logo-link">
                <img src="photo_5460840021544867927_w.jpg" alt="ForVide" class="main-logo">
            </a>
        </div>

        <div class="header-center">
            <div class="search-wrapper">
                <input type="text" placeholder="Найти контент..." class="main-search">
                <button class="search-trigger">
                    <i data-lucide="search"></i>
                </button>
            </div>
        </div>

        <div class="header-right">
            <button class="icon-action" title="Загрузить">
                <i data-lucide="upload-cloud"></i>
                <span>Загрузить</span>
            </button>
            <button class="profile-trigger" title="Личный кабинет">
                <i data-lucide="user-circle"></i>
                <span>Войти</span>
            </button>
        </div>
    </header>

    <nav class="category-nav">
        <button class="nav-item active">Все</button>
        <button class="nav-item">Трейлеры</button>
        <button class="nav-item">Кино</button>
        <button class="nav-item">Аниме</button>
        <button class="nav-item">Трансляции</button>
        <button class="nav-item">Подписки</button>
    </nav>

    <main class="content-area">
        <div class="video-shelf" id="video-grid">
            <!-- Сюда JS накидает карточки -->
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="photo_5460840021544867927_w.jpg" alt="ForVide">
                <p>Платформа для свободных авторов</p>
            </div>
            <div class="footer-links">
                <a href="#">О нас</a>
                <a href="#">Правообладателям</a>
                <a href="#">Реклама</a>
                <a href="#">Помощь</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 ForVide.ru — Все права защищены. Сделано с душой.</p>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
        // Инициализация иконок
        lucide.createIcons();
    </script>
</body>
</html>
