<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide | Главная</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header class="top-header">
        <a href="/" class="logo-link">
            <img src="main/icons/global.png" alt="ForVide Logo" class="main-logo">
        </a>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="ИСКАТЬ КОНТЕНТ...">
            <button class="search-btn"><i class="ph ph-magnifying-glass"></i></button>
        </div>

        <div class="header-controls">
            <button class="icon-btn" title="Уведомления"><i class="ph ph-bell"></i></button>
            <button class="toggle-menu-btn" id="openMenuBtn">МЕНЮ <i class="ph ph-caret-right"></i></button>
        </div>
    </header>

    <aside class="side-drop" id="sideMenu">
        <div class="side-drop-header">
            <div class="user-mini-profile" id="menuUserProfile">
                <img src="https://ui-avatars.com/api/?name=Guest&background=121212&color=fff" alt="Avatar" class="avatar-sm">
                <div class="user-mini-info">
                    <span class="user-nickname">Гость</span>
                    <span class="user-role">Зритель</span>
                </div>
            </div>
            <button class="close-drop-btn" id="closeMenuBtn"><i class="ph ph-x"></i></button>
        </div>

        <nav class="drop-nav">
            <a href="#" class="drop-link"><i class="ph ph-user"></i> Мой Профиль</a>
            <a href="#" class="drop-link"><i class="ph ph-clock-counter-clockwise"></i> История</a>
            <a href="#" class="drop-link"><i class="ph ph-heart"></i> Понравившееся</a>
            
            <div class="drop-divider"></div>
            
            <a href="studio.html" class="drop-link author-only"><i class="ph ph-video-camera"></i> VideStudio</a>
            <a href="upload.html" class="drop-link author-only"><i class="ph ph-upload-simple"></i> Загрузить видео</a>
            
            <button class="create-channel-btn" id="createChannelTrigger">Создать канал</button>

            <div class="drop-divider"></div>
            
            <a href="#" class="drop-link"><i class="ph ph-gear"></i> Настройки</a>
            <button class="drop-link text-danger" id="logoutBtn"><i class="ph ph-sign-out"></i> Выйти</button>
        </nav>
    </aside>
    <div class="drop-overlay" id="dropOverlay"></div>

    <main class="feed-container">
        
        <section class="feed-section">
            <div class="section-header">
                <h2><i class="ph-fill ph-fire"></i> ТОП 10 НЕДЕЛИ</h2>
                <div class="section-divider"></div>
            </div>
            <div class="video-grid" id="trendingGrid">
                </div>
        </section>

        <section class="feed-section">
            <div class="section-header">
                <h2><i class="ph-fill ph-game-controller"></i> ИГРАЕМ В...</h2>
                <div class="section-divider"></div>
            </div>
            <div class="video-grid" id="gamingGrid"></div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="ph ph-trend-up nav-icon"></i>
            <span>ТРЕНДЫ</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="ph-fill ph-house nav-icon"></i>
            <span>ГЛАВНАЯ</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-compass nav-icon"></i>
            <span>РЕКОМЕНДАЦИИ</span>
        </a>
    </nav>

    <div class="modal-backdrop" id="authModal">
        <div class="modal-content bento-cut">
            <button class="close-modal"><i class="ph ph-x"></i></button>
            <h2>ВХОД В СИСТЕМУ</h2>
            <p>Стань частью ForVide</p>
            <div class="auth-buttons">
                <button class="auth-btn google-btn"><i class="ph-fill ph-google-logo"></i> Войти через Google</button>
                <div class="modal-divider"><span>ИЛИ</span></div>
                <input type="email" placeholder="Email" class="modal-input">
                <input type="password" placeholder="Пароль" class="modal-input">
                <button class="auth-btn primary-btn">Продолжить</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/ui-controller.js"></script>
    <script type="module" src="js/feed-generator.js"></script>
</body>
</html>
