<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide | Просмотр</title>
    <meta name="description" content="Смотри видео на ForVide — платформе нового поколения.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>

    <!-- ШАПКА -->
    <header class="top-header">
        <a href="index.html" class="logo-link">
            <img src="main/icons/global.jpg" alt="ForVide" class="main-logo">
        </a>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="ИСКАТЬ КОНТЕНТ...">
            <button class="search-btn"><i class="ph ph-magnifying-glass"></i></button>
        </div>
        <div class="header-controls">
            <button class="toggle-menu-btn" id="openMenuBtn">МЕНЮ <i class="ph ph-caret-right"></i></button>
        </div>
    </header>

    <!-- БОКОВАЯ КАПЛЯ -->
    <aside class="side-drop" id="sideMenu">
        <div class="side-drop-header">
            <div class="user-mini-profile" id="menuUserProfile">
                <img src="https://ui-avatars.com/api/?name=G&background=111&color=fff" alt="Avatar" class="avatar-sm">
                <div class="user-mini-info">
                    <span class="user-nickname">Гость</span>
                    <span class="user-role">Зритель</span>
                </div>
            </div>
            <button class="close-drop-btn" id="closeMenuBtn"><i class="ph ph-x"></i></button>
        </div>
        <nav class="drop-nav">
            <a href="index.html" class="drop-link"><i class="ph ph-house"></i> Главная</a>
            <a href="#" class="drop-link"><i class="ph ph-heart"></i> Понравившееся</a>
            <div class="drop-divider"></div>
            <a href="studio.html" class="drop-link author-only" style="display:none"><i class="ph ph-video-camera"></i> VideStudio</a>
            <button class="create-channel-btn" id="createChannelTrigger" style="display:none">Создать канал</button>
            <div class="drop-divider"></div>
            <button class="drop-link text-danger" id="logoutBtn" style="display:none"><i class="ph ph-sign-out"></i> Выйти</button>
            <button class="drop-link" id="loginBtn"><i class="ph ph-sign-in"></i> Войти</button>
        </nav>
    </aside>
    <div class="drop-overlay" id="dropOverlay"></div>

    <!-- ПЛЕЕР -->
    <main class="player-container">

        <!-- ОСНОВНАЯ ЧАСТЬ -->
        <section class="video-main">

            <!-- ВИДЕОФРЕЙМ -->
            <div class="video-frame-container">
                <div class="video-placeholder">
                    <i class="ph-fill ph-spinner" style="animation:spin 1s linear infinite;"></i>
                    <span>ЗАГРУЗКА...</span>
                </div>
            </div>

            <!-- ШАПКА ВИДЕО -->
            <div class="video-header">
                <h1 id="videoTitle" class="player-title">Загрузка...</h1>
                <div class="video-actions">
                    <div class="stats-group">
                        <i class="ph ph-eye"></i>
                        <span id="videoViews">0 просмотров</span>
                        <span id="videoDate"></span>
                    </div>
                    <div class="buttons-group">
                        <button class="action-btn" id="likeBtn">
                            <i class="ph ph-heart"></i>
                            <span id="likeCount">0</span>
                        </button>
                        <button class="action-btn" id="shareBtn">
                            <i class="ph ph-share-network"></i>
                            <span>ПОДЕЛИТЬСЯ</span>
                        </button>
                        <button class="action-btn" id="saveBtn">
                            <i class="ph ph-bookmark-simple"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- БЛОК АВТОРА -->
            <div class="author-block">
                <div class="author-info">
                    <img src="" alt="" id="authorAvatar" class="avatar-lg">
                    <div class="author-text">
                        <h4 id="authorName">Загрузка...</h4>
                        <span id="subsCount">0 подписчиков</span>
                    </div>
                </div>
                <button class="subscribe-btn">ПОДПИСАТЬСЯ</button>
            </div>

            <!-- ОПИСАНИЕ -->
            <div class="video-description" id="videoDescriptionBlock">
                <p id="descriptionText">Загрузка описания...</p>
                <button class="show-more">ЕЩЕ</button>
            </div>

            <!-- КОММЕНТАРИИ -->
            <section class="comments-section">
                <h3>КОММЕНТАРИИ <span id="commCount">(0)</span></h3>
                <div class="comment-input-block" id="commentAuthCheck">
                    <p>Чтобы оставить комментарий, <a href="#" onclick="window.openAuthModal(); return false;">войдите</a> в аккаунт.</p>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </section>

        </section>

        <!-- САЙДБАР -->
        <aside class="video-sidebar">
            <h3>СЛЕДУЮЩЕЕ</h3>
            <div class="next-videos" id="sidebarRecommendations">
                <!-- Рекомендации -->
            </div>
        </aside>

    </main>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="ph ph-house nav-icon"></i>
            <span>ГЛАВНАЯ</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="ph-fill ph-play-circle nav-icon"></i>
            <span>ПЛЕЕР</span>
        </a>
        <a href="studio.html" class="nav-item">
            <i class="ph ph-video-camera nav-icon"></i>
            <span>СТУДИЯ</span>
        </a>
    </nav>

    <!-- МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ -->
    <div class="modal-backdrop" id="authModal">
        <div class="modal-content">
            <button class="close-modal"><i class="ph ph-x"></i></button>
            <h2>ВХОД В FORVIDE</h2>
            <p>Войди чтобы лайкать и комментировать</p>
            <div class="auth-buttons">
                <button class="auth-btn google-btn"><i class="ph-fill ph-google-logo"></i> Войти через Google</button>
                <div class="modal-divider"><span>ИЛИ</span></div>
                <input type="email" placeholder="Email" class="modal-input">
                <input type="password" placeholder="Пароль" class="modal-input">
                <button class="auth-btn primary-btn">Продолжить</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/ui-controller.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/player-logic.js"></script>

    <script>
        document.getElementById('loginBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.openAuthModal?.();
        });

        document.getElementById('saveBtn')?.addEventListener('click', () => {
            if (window.showToast) window.showToast('Видео сохранено в закладки 🔖', 'success', 2000);
        });
    </script>
</body>
</html>
