<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForVide | Профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .profile-hero {
            background: var(--fv-black);
            border-radius: var(--radius-xl);
            padding: 48px 40px 36px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }
        .profile-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(250,204,21,0.15) 0%, transparent 60%);
        }
        .profile-cover {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 180px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            overflow: hidden;
        }
        .profile-cover img { width:100%;height:100%;object-fit:cover;opacity:0.4; }
        .profile-cover-edit {
            position: absolute;
            bottom: 12px; right: 16px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            font-family: inherit;
        }
        .profile-cover-edit:hover { background: rgba(255,255,255,0.25); }
        .profile-main {
            position: relative;
            margin-top: 140px;
            display: flex;
            gap: 24px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .profile-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--fv-mustard);
            object-fit: cover;
        }
        .avatar-edit-btn {
            position: absolute;
            bottom: 0; right: 0;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--fv-mustard);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: var(--transition);
        }
        .avatar-edit-btn:hover { transform: scale(1.1); }
        .profile-info { flex: 1; min-width: 0; }
        .profile-name {
            color: white;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .profile-handle {
            color: var(--fv-mustard);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .profile-bio {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
            max-width: 500px;
        }
        .profile-stats {
            display: flex;
            gap: 32px;
            margin-top: 20px;
        }
        .pstat {
            text-align: center;
        }
        .pstat-num {
            color: white;
            font-size: 22px;
            font-weight: 900;
            display: block;
        }
        .pstat-label {
            color: rgba(255,255,255,0.45);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .profile-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .edit-profile-btn {
            background: var(--fv-mustard);
            color: var(--fv-black);
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }
        .edit-profile-btn:hover { opacity: 0.85; transform: translateY(-2px); }
        .subscribe-channel-btn {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }
        .subscribe-channel-btn:hover { border-color: var(--fv-mustard); color: var(--fv-mustard); }
        .subscribe-channel-btn.subscribed { border-color: var(--fv-mustard); color: var(--fv-mustard); }
        /* EDIT MODAL */
        .edit-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .edit-modal.open { display: flex; }
        .edit-modal-box {
            background: white;
            border-radius: var(--radius-xl);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            border: 3px solid var(--fv-black);
            box-shadow: 8px 8px 0 var(--fv-mustard);
            animation: fadeInUp 0.3s ease;
        }
        .edit-modal-box h3 {
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        .edit-input {
            width: 100%;
            border: 2px solid var(--fv-gray-200);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            font-family: inherit;
            margin-bottom: 16px;
            transition: var(--transition);
            background: var(--fv-gray-50);
        }
        .edit-input:focus { border-color: var(--fv-black); box-shadow: 4px 4px 0 var(--fv-mustard); background: white; }
        .edit-textarea { resize: none; height: 90px; }
        .edit-btns { display: flex; gap: 12px; margin-top: 8px; }
        .btn-save {
            flex: 1;
            background: var(--fv-black);
            color: white;
            border: 2px solid var(--fv-black);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-save:hover { background: var(--fv-mustard); color: var(--fv-black); border-color: var(--fv-black); }
        .btn-cancel {
            flex: 1;
            background: transparent;
            color: var(--fv-black);
            border: 2px solid var(--fv-gray-200);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-cancel:hover { border-color: var(--fv-black); }
        /* TABS */
        .profile-tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 2px solid var(--fv-gray-200); }
        .ptab {
            padding: 12px 24px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--fv-gray-400);
            position: relative;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .ptab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 2px;
            background: var(--fv-black);
            transform: scaleX(0);
            transition: var(--transition);
        }
        .ptab.active { color: var(--fv-black); }
        .ptab.active::after { transform: scaleX(1); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--fv-gray-400);
        }
        .empty-state i { font-size: 64px; display: block; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-weight: 700; font-size: 15px; }
        /* FEED CONTAINER */
        .profile-container {
            padding: 24px 40px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .profile-container { padding: 16px 16px 100px; }
            .profile-main { margin-top: 120px; }
            .profile-avatar { width: 76px; height: 76px; }
            .profile-name { font-size: 20px; }
            .profile-stats { gap: 20px; }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <a href="index.html" class="logo-link">
            <img src="main/icons/global.png" alt="ForVide" class="main-logo">
        </a>
        <div style="flex:1;"></div>
        <div class="header-controls">
            <button class="toggle-menu-btn" id="openMenuBtn">МЕНЮ <i class="ph ph-caret-right"></i></button>
        </div>
    </header>

    <aside class="side-drop" id="sideMenu">
        <div class="side-drop-header">
            <div class="user-mini-profile" id="menuUserProfile"></div>
            <button class="close-drop-btn" id="closeMenuBtn"><i class="ph ph-x"></i></button>
        </div>
        <nav class="drop-nav">
            <a href="#" class="drop-link" id="loginBtn"><i class="ph ph-sign-in"></i> Войти</a>
            <button class="drop-link" id="switchAccountBtn" style="display:none"><i class="ph ph-arrows-left-right"></i> Сменить аккаунт</button>
            <div id="accountSwitcherPanel" style="display:none;background:rgba(0,0,0,0.06);border-radius:12px;margin:0 16px;overflow:hidden;"></div>
            <div class="drop-divider"></div>
            <a href="profile.html" class="drop-link"><i class="ph ph-user"></i> Мой Профиль</a>
            <a href="history.html" class="drop-link"><i class="ph ph-clock-counter-clockwise"></i> История</a>
            <a href="liked.html" class="drop-link"><i class="ph ph-heart"></i> Понравившееся</a>
            <div class="drop-divider"></div>
            <a href="studio.html" class="drop-link author-only" style="display:none"><i class="ph ph-video-camera"></i> VideStudio</a>
            <button class="create-channel-btn" id="createChannelTrigger" style="display:none"><i class="ph ph-rocket-launch"></i> Создать канал</button>
            <div class="drop-divider"></div>
            <a href="settings.html" class="drop-link"><i class="ph ph-gear"></i> Настройки</a>
            <button class="drop-link text-danger" id="logoutBtn" style="display:none"><i class="ph ph-sign-out"></i> Выйти</button>
        </nav>
    </aside>
    <div class="drop-overlay" id="dropOverlay"></div>

    <main class="profile-container">
        <div id="profileContent">
            <div style="text-align:center;padding:80px;color:var(--fv-gray-400);font-weight:700;">
                <i class="ph ph-spinner" style="font-size:40px;animation:spin 1s linear infinite;display:block;margin-bottom:16px;"></i>
                Загрузка профиля...
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="ph ph-house nav-icon"></i><span>ГЛАВНАЯ</span></a>
        <a href="profile.html" class="nav-item active"><i class="ph-fill ph-user nav-icon"></i><span>ПРОФИЛЬ</span></a>
        <a href="studio.html" class="nav-item"><i class="ph ph-video-camera nav-icon"></i><span>СТУДИЯ</span></a>
    </nav>

    <div class="modal-backdrop" id="authModal">
        <div class="modal-content">
            <button class="close-modal"><i class="ph ph-x"></i></button>
            <h2>ВХОД В FORVIDE</h2>
            <p>Войди, чтобы видеть свой профиль</p>
            <div class="auth-buttons">
                <button class="auth-btn google-btn"><i class="ph-fill ph-google-logo"></i> Войти через Google</button>
                <div class="modal-divider"><span>ИЛИ</span></div>
                <input type="email" placeholder="Email" class="modal-input">
                <input type="password" placeholder="Пароль" class="modal-input">
                <button class="auth-btn primary-btn">Продолжить</button>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-box">
            <h3>✏️ Редактировать профиль</h3>
            <input type="text" class="edit-input" id="editName" placeholder="Имя / Название канала">
            <input type="text" class="edit-input" id="editHandle" placeholder="@никнейм (только буквы и цифры)">
            <textarea class="edit-input edit-textarea" id="editBio" placeholder="Расскажите о себе..."></textarea>
            <div class="edit-btns">
                <button class="btn-save" id="saveProfileBtn">СОХРАНИТЬ</button>
                <button class="btn-cancel" onclick="document.getElementById('editModal').classList.remove('open')">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/ui-controller.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getUserProfile, saveUserProfile, getLiked, getHistory, isSubscribed, subscribe, unsubscribe } from './js/local-db.js';

        const params = new URLSearchParams(window.location.search);
        const targetUid = params.get('uid');

        function formatNum(n) {
            if (!n) return '0';
            if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
            if (n >= 1000) return (n/1000).toFixed(1)+'K';
            return String(n);
        }

        async function loadUserProfile(uid) {
            // Пробуем Firestore
            try {
                const snap = await getDoc(doc(db, 'users', uid));
                if (snap.exists()) return { id: snap.id, ...snap.data() };
            } catch {}
            // Fallback — localStorage
            return getUserProfile(uid);
        }

        async function loadUserVideos(uid) {
            try {
                const q = query(collection(db, 'videos'), where('authorId','==',uid), orderBy('createdAt','desc'), limit(12));
                const snap = await getDocs(q);
                const videos = [];
                snap.forEach(d => videos.push({ id: d.id, ...d.data() }));
                return videos;
            } catch { return []; }
        }

        function renderVideoGrid(videos) {
            if (!videos.length) return `<div class="empty-state"><i class="ph ph-video-slash"></i><p>Видео пока нет</p></div>`;
            return `<div class="video-grid">${videos.map(v => `
                <a href="player.html?id=${v.id}" class="video-card">
                    <div class="thumb-wrapper">
                        <img src="${v.thumbnailUrl || 'https://picsum.photos/seed/'+v.id+'/800/450'}" loading="lazy">
                        <div class="thumb-overlay"><div class="play-icon-overlay"><i class="ph-fill ph-play"></i></div></div>
                        <span class="video-duration">${v.duration || '—'}</span>
                    </div>
                    <div class="video-details">
                        <div class="info-content">
                            <h3 class="video-title">${v.title}</h3>
                            <span class="video-stats">${formatNum(v.views||0)} просмотров</span>
                        </div>
                    </div>
                </a>
            `).join('')}</div>`;
        }

        async function renderProfile(profileData, currentUser) {
            const isOwn = currentUser && currentUser.uid === profileData.uid;
            const isAuthor = profileData.role === 'author';
            const liked = getLiked(profileData.uid);
            const history = getHistory(profileData.uid);
            const subbed = currentUser ? isSubscribed(currentUser.uid, profileData.uid) : false;
            const videos = isAuthor ? await loadUserVideos(profileData.uid) : [];

            document.getElementById('profileContent').innerHTML = `
                <div class="profile-hero">
                    <div class="profile-cover">
                        ${profileData.coverURL ? `<img src="${profileData.coverURL}">` : ''}
                        ${isOwn ? `<button class="profile-cover-edit" id="editCoverBtn"><i class="ph ph-camera"></i> Обложка</button>` : ''}
                    </div>
                    <div class="profile-main">
                        <div class="profile-avatar-wrap">
                            <img src="${profileData.photoURL}" class="profile-avatar" alt="${profileData.displayName}">
                            ${isOwn ? `<button class="avatar-edit-btn" id="editAvatarBtn"><i class="ph ph-pencil"></i></button>` : ''}
                        </div>
                        <div class="profile-info">
                            <div class="profile-name">${profileData.displayName}</div>
                            ${profileData.handle ? `<div class="profile-handle">${profileData.handle}</div>` : ''}
                            <div class="profile-bio">${profileData.bio || (isOwn ? '🖊️ Нажми «Редактировать» чтобы добавить описание' : 'Описание пока не добавлено')}</div>
                            <div class="profile-stats">
                                ${isAuthor ? `<div class="pstat"><span class="pstat-num">${formatNum(profileData.subscribers||0)}</span><span class="pstat-label">Подписчики</span></div>` : ''}
                                ${isAuthor ? `<div class="pstat"><span class="pstat-num">${formatNum(profileData.totalViews||0)}</span><span class="pstat-label">Просмотры</span></div>` : ''}
                                ${isOwn ? `<div class="pstat"><span class="pstat-num">${liked.length}</span><span class="pstat-label">Лайки</span></div>` : ''}
                                ${isOwn ? `<div class="pstat"><span class="pstat-num">${history.length}</span><span class="pstat-label">История</span></div>` : ''}
                            </div>
                            <div class="profile-actions">
                                ${isOwn ? `<button class="edit-profile-btn" id="openEditBtn"><i class="ph ph-pencil-simple"></i> Редактировать</button>` : ''}
                                ${isAuthor && !isOwn && currentUser ? `<button class="subscribe-channel-btn ${subbed ? 'subscribed' : ''}" id="subBtn">${subbed ? '✓ ПОДПИСАН' : 'ПОДПИСАТЬСЯ'}</button>` : ''}
                                ${isAuthor && isOwn ? `<a href="studio.html" style="background:rgba(255,255,255,0.1);color:white;text-decoration:none;padding:10px 20px;border-radius:var(--radius-sm);font-weight:900;font-size:13px;border:2px solid rgba(255,255,255,0.2);"><i class="ph ph-video-camera"></i> Студия</a>` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-tabs" id="profileTabs">
                    ${isAuthor ? `<button class="ptab active" data-tab="videos">Видео (${videos.length})</button>` : ''}
                    ${isOwn ? `<button class="ptab ${!isAuthor?'active':''}" data-tab="liked">Понравившееся (${liked.length})</button>` : ''}
                    ${isOwn ? `<button class="ptab" data-tab="history">История (${history.length})</button>` : ''}
                    ${isOwn && !isAuthor ? `<button class="ptab" data-tab="channel">Стать автором</button>` : ''}
                </div>

                ${isAuthor ? `<div class="tab-panel active" id="tab-videos">${renderVideoGrid(videos)}</div>` : ''}
                ${isOwn ? `<div class="tab-panel ${!isAuthor?'active':''}" id="tab-liked">${renderLikedGrid(liked)}</div>` : ''}
                ${isOwn ? `<div class="tab-panel" id="tab-history">${renderHistoryGrid(history)}</div>` : ''}
                ${isOwn && !isAuthor ? `<div class="tab-panel" id="tab-channel">${renderBecomeAuthor()}</div>` : ''}
            `;

            // Табы
            document.querySelectorAll('.ptab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('tab-' + tab.dataset.tab)?.classList.add('active');
                });
            });

            // Редактировать профиль
            document.getElementById('openEditBtn')?.addEventListener('click', () => {
                document.getElementById('editName').value = profileData.displayName || '';
                document.getElementById('editHandle').value = (profileData.handle || '').replace('@','');
                document.getElementById('editBio').value = profileData.bio || '';
                document.getElementById('editModal').classList.add('open');
            });

            // Сохранить профиль
            document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
                const newName = document.getElementById('editName').value.trim();
                const newHandle = document.getElementById('editHandle').value.trim();
                const newBio = document.getElementById('editBio').value.trim();
                if (!newName) { window.showToast('Введите имя', 'error'); return; }
                const updates = { displayName: newName, bio: newBio, handle: newHandle ? '@'+newHandle : '' };
                try {
                    await updateDoc(doc(db, 'users', profileData.uid), updates);
                } catch {}
                saveUserProfile(profileData.uid, { ...profileData, ...updates });
                window.showToast('Профиль сохранён ✅', 'success');
                document.getElementById('editModal').classList.remove('open');
                setTimeout(() => window.location.reload(), 800);
            });

            // Подписка
            document.getElementById('subBtn')?.addEventListener('click', (e) => {
                if (!currentUser) { window.openAuthModal(); return; }
                const now = isSubscribed(currentUser.uid, profileData.uid);
                if (now) { unsubscribe(currentUser.uid, profileData.uid); e.target.textContent = 'ПОДПИСАТЬСЯ'; e.target.classList.remove('subscribed'); window.showToast('Отписались', 'info'); }
                else { subscribe(currentUser.uid, profileData.uid); e.target.textContent = '✓ ПОДПИСАН'; e.target.classList.add('subscribed'); window.showToast('Подписались! 🔔', 'success'); }
            });
        }

        function renderLikedGrid(liked) {
            if (!liked.length) return `<div class="empty-state"><i class="ph ph-heart"></i><p>Нет понравившихся видео</p></div>`;
            return `<div class="video-grid">${liked.map(v => `
                <a href="player.html?id=${v.id}" class="video-card">
                    <div class="thumb-wrapper">
                        <img src="${v.thumbnailUrl || v.thumb || 'https://picsum.photos/seed/'+v.id+'/800/450'}" loading="lazy">
                        <div class="thumb-overlay"><div class="play-icon-overlay"><i class="ph-fill ph-play"></i></div></div>
                    </div>
                    <div class="video-details">
                        <div class="info-content">
                            <h3 class="video-title">${v.title}</h3>
                            <span class="author-name">${v.authorName || v.author || ''}</span>
                        </div>
                    </div>
                </a>
            `).join('')}</div>`;
        }

        function renderHistoryGrid(history) {
            if (!history.length) return `<div class="empty-state"><i class="ph ph-clock-counter-clockwise"></i><p>История просмотров пуста</p></div>`;
            return `<div class="video-grid">${history.map(v => `
                <a href="player.html?id=${v.id}" class="video-card">
                    <div class="thumb-wrapper">
                        <img src="${v.thumbnailUrl || v.thumb || 'https://picsum.photos/seed/'+v.id+'/800/450'}" loading="lazy">
                        <div class="thumb-overlay"><div class="play-icon-overlay"><i class="ph-fill ph-play"></i></div></div>
                    </div>
                    <div class="video-details">
                        <div class="info-content">
                            <h3 class="video-title">${v.title}</h3>
                            <span class="video-stats">${new Date(v.watchedAt).toLocaleDateString('ru-RU')}</span>
                        </div>
                    </div>
                </a>
            `).join('')}</div>`;
        }

        function renderBecomeAuthor() {
            return `
                <div style="text-align:center;padding:60px 20px;max-width:500px;margin:0 auto;">
                    <i class="ph-fill ph-rocket-launch" style="font-size:72px;color:var(--fv-mustard);display:block;margin-bottom:20px;"></i>
                    <h3 style="font-size:24px;font-weight:900;margin-bottom:12px;">СТАНЬ АВТОРОМ ForVide</h3>
                    <p style="color:var(--fv-gray-400);font-weight:600;margin-bottom:28px;line-height:1.6;">Создай свой канал и начни загружать видео. Это бесплатно и займёт меньше минуты!</p>
                    <a href="studio.html" style="display:inline-block;background:var(--fv-mustard);color:var(--fv-black);text-decoration:none;padding:14px 36px;border-radius:var(--radius-sm);font-weight:900;font-size:15px;border:2px solid var(--fv-black);box-shadow:4px 4px 0 var(--fv-black);">СОЗДАТЬ КАНАЛ</a>
                </div>
            `;
        }

        // MAIN
        onAuthStateChanged(auth, async (user) => {
            const uid = targetUid || user?.uid;
            if (!uid) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align:center;padding:80px;max-width:400px;margin:0 auto;">
                        <i class="ph ph-user-circle" style="font-size:80px;color:var(--fv-gray-400);display:block;margin-bottom:20px;"></i>
                        <h3 style="font-size:20px;font-weight:900;margin-bottom:12px;">Войди, чтобы увидеть профиль</h3>
                        <button onclick="window.openAuthModal()" style="background:var(--fv-black);color:white;border:none;padding:12px 28px;border-radius:var(--radius-sm);font-weight:900;font-size:14px;cursor:pointer;">ВОЙТИ</button>
                    </div>
                `;
                return;
            }
            const profileData = await loadUserProfile(uid);
            if (!profileData) {
                document.getElementById('profileContent').innerHTML = `<div class="empty-state"><i class="ph ph-user-x"></i><p>Пользователь не найден</p></div>`;
                return;
            }
            await renderProfile(profileData, user);
        });

        // Закрыть edit modal по клику вне
        document.getElementById('editModal')?.addEventListener('click', e => {
            if (e.target === document.getElementById('editModal')) document.getElementById('editModal').classList.remove('open');
        });
    </script>
</body>
</html>
