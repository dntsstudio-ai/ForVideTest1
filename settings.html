<div class="settings-grid">
    <section class="settings-card">
        <h3><i class="ph ph-user-gear"></i> Настройки профиля</h3>
        <div class="setting-item">
            <label>Никнейм</label>
            <input type="text" id="set_name" placeholder="Твой ник">
        </div>
        <div class="setting-item">
            <label>О себе (для авторов)</label>
            <textarea id="set_bio"></textarea>
        </div>
        <button onclick="saveSettings()" class="primary-btn">Сохранить</button>
    </section>

    <section class="settings-card">
        <h3><i class="ph ph-palette"></i> Интерфейс</h3>
        <div class="setting-item">
            <span>Темная тема</span>
            <input type="checkbox" id="dark_mode_toggle" checked>
        </div>
    </section>
</div>
